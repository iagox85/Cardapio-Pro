<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupos de Adicionais - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content">

    <header class="topbar">
      <div>
        <h1>Grupos de Adicionais</h1>
        <p>Crie grupos como “Extras”, “Molhos” ou “Bordas”.</p>
      </div>

      <div class="topbar-actions">
        <button class="notification">🔔</button>
        <button id="sair">Sair</button>
      </div>
    </header>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Lista de grupos</h2>
          <p class="panel-subtitle">Configure mínimo e máximo de escolhas.</p>
        </div>

        <button id="btnNovoGrupo">+ Novo grupo</button>
      </div>

      <form id="formGrupo" class="form-modal oculto">
        <input type="text" id="grupoNome" placeholder="Nome do grupo" required>
        <textarea id="grupoDescricao" placeholder="Descrição"></textarea>
        <input type="number" id="grupoMinimo" placeholder="Mínimo de escolhas" min="0" value="0">
        <input type="number" id="grupoMaximo" placeholder="Máximo de escolhas" min="0" value="0">

        <button type="submit">Salvar grupo</button>
      </form>

      <div id="listaGrupos" class="lista-produtos"></div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script>
  carregarSidebar("grupos");
</script>
<script src="assets/js/grupos-adicionais-admin.js"></script>

</body>
</html>
