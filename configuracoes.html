<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css">

<style>
  .link-publico-loja {
    margin-top: 24px;
    padding: 18px;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .link-publico-loja div {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
  }

  .link-publico-label {
    font-size: 13px;
    color: #6b7280;
  }

  #linkPublicoTexto {
    color: #111827;
    font-size: 15px;
    word-break: break-all;
  }

  .link-publico-loja small {
    color: #6b7280;
  }

  #btnCopiarLinkLoja {
    border: none;
    border-radius: 12px;
    background: #111827;
    color: #ffffff;
    padding: 12px 16px;
    cursor: pointer;
    white-space: nowrap;
  }

  #btnCopiarLinkLoja:hover {
    filter: brightness(0.95);
  }

  @media (max-width: 700px) {
    .link-publico-loja {
      align-items: stretch;
      flex-direction: column;
    }

    #btnCopiarLinkLoja {
      width: 100%;
    }
  }
</style>
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content">

    <header id="topbar" class="topbar"></header>

    <section class="panel">

      <div class="panel-header">
        <div>
          <h2>Configurações da Loja</h2>
          <p class="panel-subtitle">
            Atualize as informações principais da loja.
          </p>
        </div>
      </div>

      <form id="formConfiguracoes" class="form-modal">

        <input type="text" id="lojaNome" placeholder="Nome da loja" required>

        <textarea id="lojaDescricao" placeholder="Descrição da loja"></textarea>

        <input type="text" id="lojaWhatsapp" placeholder="WhatsApp com DDD">

        <input type="text" id="lojaTelefone" placeholder="Telefone">

        <input type="text" id="lojaPix" placeholder="Chave PIX">

        <input type="number" id="lojaPedidoMinimo" placeholder="Pedido mínimo" step="0.01">

        <input type="number" id="lojaTempoEntrega" placeholder="Tempo médio de entrega em minutos">

        <button type="submit">
          Salvar configurações
        </button>

      </form>



      <div class="link-publico-loja">
        <div>
          <span class="link-publico-label">Link público da loja</span>
          <strong id="linkPublicoTexto">Carregando link...</strong>
          <small>Compartilhe este link com seus clientes.</small>
        </div>

        <button type="button" id="btnCopiarLinkLoja">
          Copiar link
        </button>
      </div>

      <div id="mensagemConfiguracoes"></div>

    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/topbar.js"></script>

<script>
  carregarSidebar("configuracoes");
  carregarTopbar(
    "Configurações",
    "Gerencie as informações principais da sua loja."
  );
</script>

<script src="assets/js/configuracoes-admin.js"></script>

</body>
</html>
