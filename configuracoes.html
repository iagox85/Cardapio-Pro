<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css">

<style>
  .link-publico-loja {
    margin-top: 24px;
    padding: 22px;
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    background: #ffffff;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 22px;
    align-items: center;
  }

  .link-publico-info {
    min-width: 0;
  }

  .link-publico-topo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .link-publico-icone {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: #ecfdf5;
    color: #047857;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .link-publico-label {
    display: block;
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 2px;
  }

  .link-publico-titulo {
    font-size: 17px;
    color: #111827;
    font-weight: 800;
  }

  .link-publico-url {
    display: inline-block;
    max-width: 100%;
    margin-top: 8px;
    color: #111827;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    word-break: break-all;
  }

  .link-publico-url:hover {
    text-decoration: underline;
  }

  .link-publico-descricao {
    margin-top: 6px;
    color: #6b7280;
    font-size: 13px;
  }

  .link-publico-acoes {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }

  .btn-link-publico {
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, filter 0.2s ease;
  }

  .btn-link-publico:hover {
    transform: translateY(-1px);
    filter: brightness(0.96);
  }

  .btn-link-publico.primario {
    background: #10b981;
    color: #ffffff;
  }

  .btn-link-publico.secundario {
    background: #111827;
    color: #ffffff;
  }

  .qr-code-box {
    width: 160px;
    padding: 12px;
    border-radius: 18px;
    border: 1px solid #e5e7eb;
    background: #f9fafb;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #qrCodeCanvas {
    width: 132px;
    height: 132px;
    background: #ffffff;
    border-radius: 10px;
  }

  .qr-code-box small {
    text-align: center;
    color: #6b7280;
    font-size: 12px;
    line-height: 1.3;
  }

  #btnBaixarQrCode {
    width: 100%;
    padding: 10px 12px;
    font-size: 12px;
  }

  #mensagemConfiguracoes {
    margin-top: 12px;
    font-size: 14px;
    color: #047857;
  }

  @media (max-width: 820px) {
    .link-publico-loja {
      grid-template-columns: 1fr;
    }

    .qr-code-box {
      width: 100%;
    }

    #qrCodeCanvas {
      width: 150px;
      height: 150px;
    }
  }

  @media (max-width: 560px) {
    .link-publico-acoes {
      flex-direction: column;
    }

    .btn-link-publico {
      width: 100%;
    }
  }
</style>
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content">

    <header id="topbar" class="topbar"></header>

    <section class="panel">

      <div class="panel-header">
        <div>
          <h2>Configurações da Loja</h2>
          <p class="panel-subtitle">
            Atualize as informações principais da loja.
          </p>
        </div>
      </div>

      <form id="formConfiguracoes" class="form-modal">

        <input type="text" id="lojaNome" placeholder="Nome da loja" required>

        <textarea id="lojaDescricao" placeholder="Descrição da loja"></textarea>

        <input type="text" id="lojaWhatsapp" placeholder="WhatsApp com DDD">

        <input type="text" id="lojaTelefone" placeholder="Telefone">

        <input type="text" id="lojaPix" placeholder="Chave PIX">

        <input type="number" id="lojaPedidoMinimo" placeholder="Pedido mínimo" step="0.01">

        <input type="number" id="lojaTempoEntrega" placeholder="Tempo médio de entrega em minutos">

        <button type="submit">
          Salvar configurações
        </button>

      </form>

      <div class="link-publico-loja">
        <div class="link-publico-info">
          <div class="link-publico-topo">
            <div class="link-publico-icone">🔗</div>
            <div>
              <span class="link-publico-label">Link do seu cardápio</span>
              <div class="link-publico-titulo">Cardápio público da loja</div>
            </div>
          </div>

          <a href="#" target="_blank" rel="noopener" id="linkPublicoTexto" class="link-publico-url">
            Carregando link...
          </a>

          <p class="link-publico-descricao">
            Este é o link público da sua loja. Compartilhe com seus clientes para receber pedidos.
          </p>

          <div class="link-publico-acoes">
            <a href="#" target="_blank" rel="noopener" id="btnAbrirCardapio" class="btn-link-publico primario">
              Abrir cardápio
            </a>

            <button type="button" id="btnCopiarLinkLoja" class="btn-link-publico secundario">
              Copiar link
            </button>
          </div>
        </div>

        <div class="qr-code-box">
          <canvas id="qrCodeCanvas" width="132" height="132"></canvas>
          <small>Use este QR Code em mesas, balcão, embalagens ou panfletos.</small>
          <button type="button" id="btnBaixarQrCode" class="btn-link-publico secundario">
            Baixar QR Code
          </button>
        </div>
      </div>

      <div id="mensagemConfiguracoes"></div>

    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/topbar.js"></script>

<script>
  carregarSidebar("configuracoes");
  carregarTopbar(
    "Configurações",
    "Gerencie as informações principais da sua loja."
  );
</script>

<script src="assets/js/configuracoes-admin.js"></script>

</body>
</html>
