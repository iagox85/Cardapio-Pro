<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content">

    <header id="topbar" class="topbar"></header>

    <section class="panel">

      <div class="panel-header">
        <div>
          <h2>Configurações da Loja</h2>
          <p class="panel-subtitle">
            Atualize os dados que aparecerão no cardápio online.
          </p>
        </div>
      </div>

      <form id="formConfiguracoes" class="form-modal">

        <input type="text" id="lojaNome" placeholder="Nome da loja" required>

        <input type="text" id="lojaTelefone" placeholder="Telefone">

        <input type="text" id="lojaWhatsapp" placeholder="WhatsApp com DDD">

        <input type="text" id="lojaPix" placeholder="Chave PIX">

        <input type="text" id="lojaEndereco" placeholder="Endereço">

        <input type="text" id="lojaCidade" placeholder="Cidade">

        <input type="text" id="lojaCep" placeholder="CEP">

        <input type="number" id="lojaTaxaEntrega" placeholder="Taxa de entrega" step="0.01">

        <input type="number" id="lojaPedidoMinimo" placeholder="Pedido mínimo" step="0.01">

        <input type="number" id="lojaTempoEntrega" placeholder="Tempo médio de entrega em minutos">

        <textarea id="lojaDescricao" placeholder="Descrição da loja"></textarea>

        <button type="submit">
          Salvar configurações
        </button>

      </form>

      <div id="mensagemConfiguracoes"></div>

    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/topbar.js"></script>

<script>
  carregarSidebar("configuracoes");
  carregarTopbar(
    "Configurações",
    "Gerencie as informações principais da sua loja."
  );
</script>

<script src="assets/js/configuracoes-admin.js"></script>

</body>
</html>
