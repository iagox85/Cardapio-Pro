<form id="formAdicional" class="form-modal oculto">
  <input type="text" id="adicionalNome" placeholder="Nome do adicional" required>

  <textarea id="adicionalDescricao" placeholder="Descrição"></textarea>

  <select id="adicionalGrupo">
    <option value="">Selecione um grupo</option>
  </select>

  <input type="number" id="adicionalPreco" placeholder="Preço" step="0.01" required>

  <button type="submit">Salvar adicional</button>
</form>
