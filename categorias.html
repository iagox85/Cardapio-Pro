<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside class="sidebar">
    <h2>DeliveryOS</h2>

    <nav>
      <a href="admin.html">📊 Dashboard</a>
      <a>📦 Pedidos</a>
      <a href="produtos.html">🍔 Produtos</a>
      <a class="active" href="categorias.html">📂 Categorias</a>
      <a>🧀 Adicionais</a>
      <a>📈 Relatórios</a>
      <a>⚙️ Configurações</a>
    </nav>
  </aside>

  <main class="content">

    <header class="topbar">
      <div>
        <h1>Categorias</h1>
        <p>Organize os produtos do cardápio.</p>
      </div>

      <div class="topbar-actions">
        <button class="notification">🔔</button>
        <button id="sair">Sair</button>
      </div>
    </header>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Lista de categorias</h2>
          <p class="panel-subtitle">Ex: Hambúrgueres, Bebidas, Combos.</p>
        </div>

        <button id="btnNovaCategoria">+ Nova categoria</button>
      </div>

      <form id="formCategoria" class="form-modal oculto">
        <input type="text" id="categoriaNome" placeholder="Nome da categoria" required>
        <textarea id="categoriaDescricao" placeholder="Descrição"></textarea>
        <button type="submit">Salvar categoria</button>
      </form>

      <div id="listaCategorias" class="lista-produtos"></div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/categorias-admin.js"></script>

</body>
</html>
